# =============================================================================
# SuperEncoder — Rolling Per-Snapshot Configuration (v2)
# =============================================================================
# Use with: python train_super_encoder.py --config configs/super_encoder.yaml
#
# Combines autoencoder factor compression (bottleneck) with cross-sectional
# self-attention on the latent space.  Factors are compressed per-stock,
# then all stocks on the same date attend to each other in that compact
# latent space before per-stock prediction.
#
# ⚠ Each "sample" is one date (all stocks).  batch_size refers to number
#   of dates per gradient step, not individual stock-date rows.

data_dir: "data/"

snapshots:
  - "20181228"
  - "20191231"
  - "20201231"

snapshot_oos_end:
  "20181228": 20191231
  "20191231": 20201231
  "20201231": 20211231

universe_file: ""

factor_keys: ["0", "1", "2"]

model:
  # ── Autoencoder ──
  encoder_sizes: [1024, 512]    # Wider encoder for richer factor interactions
  latent_dim: 128               # Richer latent for cross-sectional attention (128/8=16 per head)
  predictor_sizes: [256, 128]   # Deeper prediction head
  dropout: 0.25                 # Slightly less dropout — bigger model benefits from seeing more
  recon_weight: 0.1             # Reconstruction loss weight (0 = disable)
  use_residual: true            # Residual connections in encoder (where dims match)
  ic_loss_weight: 1.0           # IC consistency loss: -mean(IC) + std(IC), directly optimises ICIR
  output_tanh: true             # Cap predictions with tanh — prevents outliers from distorting IC
  cs_normalize: true            # Per-date z-score normalization — removes cross-date scale drift
  ema_decay: 0.999              # EMA of model weights for smoother inference (0 = disable)

  # ── Cross-Sectional Transformer (on latent space) ──
  cs_n_heads: 8                 # Attention heads (latent_dim must be divisible)
  cs_n_layers: 2                # Fewer layers = less regime overfitting
  cs_dim_feedforward: 512       # Wider FFN inside transformer
  cs_dropout: 0.4               # Higher dropout for CS attention (stabilises ICIR)

training:
  epochs: 150                   # More epochs — bigger model needs longer to converge
  batch_size: 6                 # More dates per gradient step (~17GB estimated)
  learning_rate: 0.00008        # Slightly higher for larger batch (√(6/4) scaling)
  weight_decay: 0.01
  warmup_epochs: 15             # Longer warmup for bigger model
  early_stopping_patience: 25   # More patience — gated model trains slower
  early_stopping_metric: "icir" # Stop on best ICIR, not best val_loss
  val_ratio: 0.15
  random_seed: 42

evaluation:
  label_period: 10
  alpha: 1

output:
  output_dir: "outputs_super_encoder"
