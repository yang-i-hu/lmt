# =============================================================================
# ElasticNet Training Configuration - Full Dataset
# =============================================================================

# Data directory containing parquet files
data_dir: "raw_data/"

# Factor matrix key: '0', '1', or '2'
factor_key: "0"

# Date range filter (format: YYYYMMDD)
# null = include all dates
start_date: null
end_date: null

# Instrument universe
# null = include all instruments (full universe)
universe_file: null
universe_list: null

# Load aligned data with labels
aligned_only: true

# Drop rows where labelValue is NaN
drop_na_labels: true

# =============================================================================
# ElasticNet Model Parameters
# =============================================================================

model:
  # Regularization strength (higher = more regularization)
  alpha: 0.01
  
  # L1 ratio: 0 = Ridge, 1 = Lasso, 0.5 = balanced
  l1_ratio: 0.5
  
  # Maximum iterations for optimization
  max_iter: 1000
  
  # Tolerance for stopping criteria
  tol: 0.0001
  
  # Fit intercept term
  fit_intercept: true

# =============================================================================
# Training Parameters
# =============================================================================

training:
  # Train/test split ratio (by time)
  train_ratio: 0.8
  
  # Random seed for reproducibility
  random_seed: 42

# =============================================================================
# Output
# =============================================================================

output:
  # Directory to save model and results
  output_dir: "outputs/"
  
  # Model filename
  model_file: "elasticnet_model.pkl"
  
  # Scaler filename
  scaler_file: "scaler.pkl"
  
  # Results filename
  results_file: "training_results.json"
