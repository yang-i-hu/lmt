# =============================================================================
# DNN Training Configuration - Full Dataset
# =============================================================================

# Data directory containing parquet files
data_dir: "data/"

# Factor matrix key: '0', '1', or '2'
factor_key: "0"

# Date range filter (format: YYYYMMDD)
# null = include all dates
start_date: null
end_date: null

# Instrument universe
# null = include all instruments (full universe)
universe_file: null
universe_list: null

# Load aligned data with labels
aligned_only: true

# Drop rows where labelValue is NaN
drop_na_labels: true

# =============================================================================
# DNN Model Architecture
# =============================================================================

model:
  # Hidden layer sizes
  hidden_sizes: [512, 256, 128, 64]
  
  # Dropout rate for regularization
  dropout: 0.3
  
  # Activation function: 'relu', 'leaky_relu', 'gelu', 'silu'
  activation: "leaky_relu"
  
  # Batch normalization
  batch_norm: true
  
  # Output activation (null for regression)
  output_activation: null

# =============================================================================
# Training Parameters
# =============================================================================

training:
  # Train/validation/test split ratios (by time)
  train_ratio: 0.7
  val_ratio: 0.15
  # test_ratio is implicit: 1 - train_ratio - val_ratio = 0.15
  
  # Batch size
  batch_size: 4096
  
  # Number of epochs
  epochs: 100
  
  # Learning rate
  learning_rate: 0.001
  
  # Weight decay (L2 regularization)
  weight_decay: 0.0001
  
  # Learning rate scheduler
  scheduler:
    type: "cosine"  # 'cosine', 'step', 'plateau', null
    # For step scheduler
    step_size: 30
    gamma: 0.1
    # For plateau scheduler
    patience: 10
    factor: 0.5
  
  # Early stopping
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.0001
  
  # Gradient clipping
  grad_clip: 1.0
  
  # Random seed for reproducibility
  random_seed: 42

# =============================================================================
# Loss Function
# =============================================================================

loss:
  # Loss type: 'mse', 'mae', 'huber', 'ic_loss'
  type: "mse"
  # Huber delta (only for huber loss)
  huber_delta: 1.0

# =============================================================================
# Output
# =============================================================================

output:
  # Directory to save model and results
  output_dir: "outputs_dnn/"
  
  # Model filename
  model_file: "dnn_model.pt"
  
  # Scaler filename
  scaler_file: "scaler.pkl"
  
  # Results filename
  results_file: "training_results.json"
  
  # Save best model based on validation loss
  save_best: true
  
  # Log training progress every N batches
  log_interval: 100
